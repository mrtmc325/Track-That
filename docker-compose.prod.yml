# Production overrides for docker-compose.yml
# Per Phase 15 spec section 15.7: Container Runtime Security Summary
#
# All application containers enforce:
#   - Non-root user (trackuser UID 1000)
#   - Read-only root filesystem
#   - No new privileges
#   - All capabilities dropped
#   - Resource limits (CPU + memory)
#   - Health checks
#
# security.release_runtime_non_root_identity
# security.least_privilege_everywhere

version: '3.8'

services:
  auth-service:
    image: ${REGISTRY:-ghcr.io/track-that}/auth:${TAG:-latest}
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  search-service:
    image: ${REGISTRY:-ghcr.io/track-that}/search:${TAG:-latest}
