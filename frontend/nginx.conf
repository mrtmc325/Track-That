server {
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;

    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "DENY"              always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(self)" always;

    # Proxy API calls to backend services (same Docker network)
    # 75s proxy timeout — stealth crawls take up to 65s
    proxy_read_timeout 75s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;

    # Forward cookies + auth headers to all backend services
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;

    location /api/v1/auth { proxy_pass http://auth-service:3001; }
    location /api/v1/users { proxy_pass http://auth-service:3001; }
    location /api/v1/search { proxy_pass http://search-service:3002; }
    location /api/v1/products { proxy_pass http://search-service:3002; }
    location /api/v1/categories { proxy_pass http://search-service:3002; }
    location /api/v1/prices { proxy_pass http://price-service:3003; }
    location /api/v1/cart { proxy_pass http://cart-service:3004; }
    location /api/v1/checkout { proxy_pass http://cart-service:3004; }
    location /api/v1/orders { proxy_pass http://cart-service:3004; }
    location /api/v1/delivery { proxy_pass http://delivery-service:3005; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/coupons { proxy_pass http://ads-service:3006; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/deals { proxy_pass http://ads-service:3006; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/geo { proxy_pass http://geo-service:3008; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # SPA fallback — all non-asset paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness probe — returns 200 OK with no body
    location /healthz {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets aggressively (Vite fingerprints filenames)
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache the SPA entry point
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
