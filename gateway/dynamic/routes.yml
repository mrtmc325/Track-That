http:
  routers:
    auth-router:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      middlewares:
        - rate-limit-auth
        - security-headers
        - cors
      tls: {}

    search-router:
      rule: "PathPrefix(`/api/v1/search`) || PathPrefix(`/api/v1/products`) || PathPrefix(`/api/v1/categories`)"
      service: search-service
      middlewares:
        - rate-limit-search
        - security-headers
        - cors
      tls: {}

    price-router:
      rule: "PathPrefix(`/api/v1/prices`)"
      service: price-service
      middlewares:
        - security-headers
        - cors
      tls: {}

    cart-router:
      rule: "PathPrefix(`/api/v1/cart`) || PathPrefix(`/api/v1/checkout`) || PathPrefix(`/api/v1/orders`)"
      service: cart-service
      middlewares:
        - rate-limit-checkout
        - security-headers
        - cors
      tls: {}

    delivery-router:
      rule: "PathPrefix(`/api/v1/delivery`)"
      service: delivery-service
      middlewares:
        - security-headers
        - cors
      tls: {}

    ads-router:
      rule: "PathPrefix(`/api/v1/coupons`) || PathPrefix(`/api/v1/deals`) || PathPrefix(`/api/v1/flyers`)"
      service: ads-service
      middlewares:
        - security-headers
        - cors
      tls: {}

    geo-router:
      rule: "PathPrefix(`/api/v1/geo`)"
      service: geo-service
      middlewares:
        - security-headers
        - cors
      tls: {}

    frontend-router:
      rule: "PathPrefix(`/`)"
      service: frontend
      priority: 1
      middlewares:
        - security-headers
      tls: {}

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:3001"

    search-service:
      loadBalancer:
        servers:
          - url: "http://search-service:3002"

    price-service:
      loadBalancer:
        servers:
          - url: "http://price-service:3003"

    cart-service:
      loadBalancer:
        servers:
          - url: "http://cart-service:3004"

    delivery-service:
      loadBalancer:
        servers:
          - url: "http://delivery-service:3005"

    ads-service:
      loadBalancer:
        servers:
          - url: "http://ads-service:3006"

    geo-service:
      loadBalancer:
        servers:
          - url: "http://geo-service:3008"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
